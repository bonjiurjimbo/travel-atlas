<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>旅の台帳</title>
  <style>
    :root {
      --ink: #1c2528;
      --muted: #667277;
      --line: #d8e0df;
      --paper: #f7f5ef;
      --panel: #ffffff;
      --green: #2f6f63;
      --blue: #315f85;
      --red: #a64d44;
      --yellow: #d4a640;
      --shadow: 0 12px 32px rgba(28, 37, 40, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(rgba(247, 245, 239, .92), rgba(247, 245, 239, .92)),
        url("data:image/svg+xml,%3Csvg width='160' height='160' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23cfd8d5' stroke-width='1'%3E%3Cpath d='M0 40h160M0 80h160M0 120h160M40 0v160M80 0v160M120 0v160'/%3E%3Ccircle cx='80' cy='80' r='54'/%3E%3Cpath d='M26 80h108M80 26v108M42 42l76 76M118 42l-76 76'/%3E%3C/g%3E%3C/svg%3E");
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      line-height: 1.6;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      color: inherit;
      border: 1px solid var(--line);
      background: var(--panel);
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px clamp(16px, 4vw, 44px);
      background: rgba(247, 245, 239, .88);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-weight: 800;
      letter-spacing: 0;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      color: #fff;
      background: var(--green);
      border-radius: 7px;
      flex: 0 0 auto;
    }

    .nav {
      display: flex;
      gap: 8px;
      overflow-x: auto;
    }

    .nav button,
    .ghost {
      min-height: 36px;
      padding: 7px 12px;
      border-radius: 7px;
      white-space: nowrap;
    }

    .nav button.active,
    .ghost.primary {
      color: #fff;
      border-color: var(--green);
      background: var(--green);
    }

    main {
      padding: 26px clamp(16px, 4vw, 44px) 48px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 440px);
      gap: 28px;
      align-items: stretch;
      min-height: 360px;
      margin-bottom: 28px;
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    h1 {
      max-width: 820px;
      margin-bottom: 16px;
      font-size: clamp(34px, 6vw, 68px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    h2 {
      margin-bottom: 14px;
      font-size: clamp(22px, 3vw, 34px);
      letter-spacing: 0;
    }

    h3 {
      margin-bottom: 8px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .lead {
      max-width: 760px;
      color: var(--muted);
      font-size: 17px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .atlas {
      position: relative;
      min-height: 300px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #e9efec;
      box-shadow: var(--shadow);
    }

    .atlas svg {
      width: 100%;
      height: 100%;
      min-height: 320px;
      display: block;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 18px;
      max-width: 760px;
    }

    .stat {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .72);
    }

    .stat strong {
      display: block;
      font-size: 22px;
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) minmax(150px, 220px) minmax(140px, 200px);
      gap: 10px;
      margin: 20px 0 16px;
    }

    .field {
      position: relative;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 42px;
      padding: 8px 11px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      color: var(--ink);
    }

    .trip-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .trip-card {
      min-height: 245px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 8px 18px rgba(28, 37, 40, .06);
      text-align: left;
    }

    .trip-card:hover,
    .trip-card:focus {
      outline: 2px solid rgba(47, 111, 99, .28);
      transform: translateY(-1px);
    }

    .trip-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #eef3f1;
      color: #3d5654;
      font-size: 12px;
      white-space: nowrap;
    }

    .pill.plan { background: #f4ead4; color: #72541c; }
    .pill.ready { background: #e2eef7; color: #214f72; }
    .pill.live { background: #f7e1dd; color: #803b34; }

    .route-line {
      color: var(--muted);
      font-size: 14px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
    }

    .detail {
      display: none;
    }

    .detail.visible,
    .home.visible {
      display: block;
    }

    .home.hidden {
      display: none;
    }

    .detail-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 18px;
      align-items: start;
      margin-bottom: 18px;
    }

    .summary-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 16px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid #edf1f0;
      font-size: 14px;
    }

    .summary-row:last-child {
      border-bottom: 0;
    }

    .summary-row span:first-child {
      color: var(--muted);
    }

    .tabs,
    .day-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      margin: 14px 0;
    }

    .tabs button,
    .day-tabs button {
      min-width: 76px;
      min-height: 38px;
      padding: 7px 12px;
      border-radius: 7px;
      white-space: nowrap;
    }

    .tabs button.active,
    .day-tabs button.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .two-col {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 16px;
      align-items: start;
    }

    .sheet {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px 11px;
      border-bottom: 1px solid #edf1f0;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #f2f5f4;
      color: #425052;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .time {
      width: 92px;
      color: var(--blue);
      font-weight: 700;
      white-space: nowrap;
    }

    .time.fixed {
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
    }

    .cost {
      width: 96px;
      text-align: right;
      white-space: nowrap;
    }

    .checklist,
    .memo-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .checklist li,
    .memo-list li {
      display: flex;
      gap: 9px;
      padding: 10px;
      border: 1px solid #edf1f0;
      border-radius: 7px;
      background: #fbfcfb;
      font-size: 14px;
    }

    .check {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      border: 2px solid var(--green);
      border-radius: 4px;
      flex: 0 0 auto;
    }

    .side-stack {
      display: grid;
      gap: 12px;
    }

    .note {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .note p,
    .note li {
      color: var(--muted);
      font-size: 14px;
    }

    .note ul {
      margin: 8px 0 0;
      padding-left: 18px;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .empty {
      padding: 22px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .7);
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .hero,
      .detail-head,
      .two-col {
        grid-template-columns: 1fr;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      main {
        padding-top: 18px;
      }
    }

    @media (max-width: 620px) {
      .trip-grid {
        grid-template-columns: 1fr;
      }

      th:nth-child(4),
      td:nth-child(4) {
        display: none;
      }

      .cost {
        width: 72px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">◇</div>
        <span>旅の台帳</span>
      </div>
      <nav class="nav" aria-label="表示切り替え">
        <button class="active" data-home-filter="all">すべて</button>
        <button data-home-filter="plan">計画中</button>
        <button data-home-filter="ready">準備中</button>
        <button data-home-filter="live">旅行中</button>
      </nav>
    </header>

    <main>
      <section id="home" class="home visible">
        <div class="hero">
          <div>
            <h1>国内旅の延長線上に、世界をつないでいく。</h1>
            <p class="lead">10年分の海外・国内旅行をまとめるための台帳です。トップで旅を選び、詳細ページで日別の旅程、準備、現地確認メモを見られるようにしています。</p>
            <div class="hero-actions">
              <button class="ghost primary" id="showNextTrip">次の旅を見る</button>
              <button class="ghost" id="showPreparing">準備リストへ</button>
            </div>
            <div class="stats" aria-label="旅の集計">
              <div class="stat"><strong id="tripCount">0</strong><span>登録した旅行</span></div>
              <div class="stat"><strong id="countryCount">0</strong><span>国と地域</span></div>
              <div class="stat"><strong id="dayCount">0</strong><span>計画済み日数</span></div>
            </div>
          </div>
          <div class="atlas" aria-label="旅の地図イメージ">
            <svg viewBox="0 0 520 380" role="img" aria-labelledby="mapTitle">
              <title id="mapTitle">東京からアジア、欧州、南米へ線が伸びる地図</title>
              <rect width="520" height="380" fill="#e9efec"></rect>
              <path d="M65 164c44-46 100-62 162-44 39 11 67 4 102-20 52-36 106-26 139 20" fill="none" stroke="#a7bbb5" stroke-width="22" stroke-linecap="round" opacity=".45"></path>
              <path d="M78 243c72-24 134-16 185 24 54 42 112 38 184-12" fill="none" stroke="#bccbc7" stroke-width="18" stroke-linecap="round" opacity=".5"></path>
              <path d="M354 82c38 58 35 113-8 166" fill="none" stroke="#d7c184" stroke-width="15" stroke-linecap="round" opacity=".45"></path>
              <path d="M382 283c24 24 54 31 91 22" fill="none" stroke="#c98f82" stroke-width="16" stroke-linecap="round" opacity=".35"></path>
              <path d="M414 118c-49 20-92 54-130 102-31 39-67 64-108 77" fill="none" stroke="#315f85" stroke-width="3" stroke-dasharray="7 8"></path>
              <path d="M414 118c-61 16-113 31-156 46-50 17-88 31-114 42" fill="none" stroke="#2f6f63" stroke-width="3" stroke-dasharray="7 8"></path>
              <path d="M414 118c-11 59 1 107 36 145" fill="none" stroke="#a64d44" stroke-width="3" stroke-dasharray="7 8"></path>
              <g fill="#fff" stroke="#1c2528" stroke-width="3">
                <circle cx="414" cy="118" r="8"></circle>
                <circle cx="144" cy="206" r="8"></circle>
                <circle cx="176" cy="297" r="8"></circle>
                <circle cx="450" cy="263" r="8"></circle>
              </g>
              <g font-family="sans-serif" font-size="13" fill="#1c2528" font-weight="700">
                <text x="428" y="122">Tokyo</text>
                <text x="88" y="209">Europe</text>
                <text x="108" y="321">South America</text>
                <text x="390" y="290">SEA</text>
              </g>
            </svg>
          </div>
        </div>

        <div class="toolbar" aria-label="旅行の検索と絞り込み">
          <div class="field"><input id="search" type="search" placeholder="旅行名、国、都市で検索"></div>
          <div class="field">
            <select id="regionFilter" aria-label="地域">
              <option value="all">すべての地域</option>
            </select>
          </div>
          <div class="field">
            <select id="yearFilter" aria-label="年">
              <option value="all">すべての年</option>
            </select>
          </div>
        </div>
        <div id="tripGrid" class="trip-grid"></div>
      </section>

      <section id="detail" class="detail" aria-live="polite">
        <button class="ghost" id="backHome">一覧へ戻る</button>
        <div class="detail-head">
          <div>
            <div class="trip-meta" id="detailMeta"></div>
            <h2 id="detailTitle"></h2>
            <p class="lead" id="detailConcept"></p>
          </div>
          <aside class="summary-panel" id="summaryPanel"></aside>
        </div>

        <div class="tabs" aria-label="詳細表示">
          <button class="active" data-view="schedule">日別旅程</button>
          <button data-view="prep">準備</button>
          <button data-view="budget">費用</button>
          <button data-view="notes">メモ</button>
        </div>

        <div id="scheduleView" class="view active">
          <div class="day-tabs" id="dayTabs" aria-label="日付選択"></div>
          <div class="two-col">
            <div class="sheet">
              <table>
                <thead>
                  <tr>
                    <th>時刻</th>
                    <th>予定</th>
                    <th>場所</th>
                    <th>予約・確認</th>
                    <th>費用</th>
                  </tr>
                </thead>
                <tbody id="scheduleBody"></tbody>
              </table>
            </div>
            <aside class="side-stack">
              <div class="note">
                <h3>その日の狙い</h3>
                <p id="dayAim"></p>
              </div>
              <div class="note">
                <h3>当日チェック</h3>
                <ul class="checklist" id="dayChecks"></ul>
              </div>
            </aside>
          </div>
        </div>

        <div id="prepView" class="view">
          <div class="two-col">
            <div class="note">
              <h3>出発前チェック</h3>
              <ul class="checklist" id="prepList"></ul>
            </div>
            <div class="note">
              <h3>持ち物</h3>
              <ul class="checklist" id="packingList"></ul>
            </div>
          </div>
        </div>

        <div id="budgetView" class="view">
          <div class="sheet">
            <table>
              <thead>
                <tr><th>項目</th><th>見積</th><th>メモ</th></tr>
              </thead>
              <tbody id="budgetBody"></tbody>
            </table>
          </div>
        </div>

        <div id="notesView" class="view">
          <div class="note">
            <h3>調べたこと・残課題</h3>
            <ul class="memo-list" id="notesList"></ul>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="trips-data.js"></script>
  <script>
    let trips = [];

    const statusText = { plan: "計画中", ready: "準備中", live: "旅行中" };
    let currentFilter = "all";
    let activeTrip = null;
    let activeDay = 0;

    const home = document.getElementById("home");
    const detail = document.getElementById("detail");
    const grid = document.getElementById("tripGrid");
    const search = document.getElementById("search");
    const regionFilter = document.getElementById("regionFilter");
    const yearFilter = document.getElementById("yearFilter");

    function yen(value) {
      if (value === null || value === undefined || value === "") return "";
      if (typeof value === "number") return value.toLocaleString("ja-JP") + "円";
      return value;
    }

    function compact(items) {
      return items.filter((item) => item !== null && item !== undefined && item !== "");
    }

    function displayDate(day) {
      return compact([day.dateLabel, day.weekday ? `（${day.weekday}）` : "", day.title]).join(" ");
    }

    function itemPlace(item) {
      if (item.origin && item.destination) return `${item.origin} → ${item.destination}`;
      return item.origin || item.destination || "";
    }

    function itemTime(item) {
      if (item.startTime && item.endTime) return `${item.startTime}-${item.endTime}`;
      return item.startTime || item.endTime || "";
    }

    function normalizeStatus(status) {
      const map = { "計画中": "plan", "準備中": "ready", "旅行中": "live", "完了": "done", "保留": "hold" };
      return map[status] || status || "plan";
    }

    function normalizePreparationItem(item, includeQuantity = false) {
      if (typeof item === "string") return item;
      const quantity = includeQuantity && item.quantity ? ` ${item.quantity}${item.unit || ""}` : "";
      const status = item.status && item.status !== "todo" && item.status !== "未着手" ? `（${item.status}）` : "";
      const memo = item.memo ? ` - ${item.memo}` : "";
      return `${item.name || item.item || ""}${quantity}${status}${memo}`;
    }

    function normalizeNewTrip(trip) {
      const prep = trip.preparation || {};
      const prepList = [
        ...(prep.reservations || []).map((item) => normalizePreparationItem(item)),
        ...(prep.procedures || []).map((item) => normalizePreparationItem(item)),
        ...(prep.others || []).map((item) => normalizePreparationItem(item))
      ];
      const packingList = (prep.packing || []).map((item) => normalizePreparationItem(item, true));
      return {
        id: trip.id,
        title: trip.title,
        year: trip.year,
        season: trip.season,
        status: normalizeStatus(trip.status),
        region: trip.region,
        length: trip.length,
        countries: trip.countries || [],
        route: trip.route,
        concept: trip.concept,
        notes: trip.notes || [],
        prep: prepList,
        packing: packingList,
        budget: ((trip.budget && trip.budget.summary) || []).map((row) => [
          row.category,
          yen(row.estimate),
          row.memo || ""
        ]),
        days: (trip.days || []).map((day) => ({
          label: `${day.dayNumber}日目`,
          date: displayDate(day),
          dateLabel: day.dateLabel || "",
          weekday: day.weekday || "",
          title: day.title || "",
          aim: day.aim || "",
          checks: day.checks || [],
          schedule: (day.items || [])
            .filter((item) => item.isPublished !== false)
            .map((item) => ({
              time: itemTime(item),
              activity: item.activity || item.type || "",
              place: itemPlace(item),
              confirmation: item.confirmation || item.memo || "",
              cost: item.costs ? item.costs.total : "",
              fixedTime: Boolean(item.fixedTime),
              distanceKm: item.distanceKm,
              durationHours: item.durationHours
            }))
        }))
      };
    }

    function normalizeOldTrip(trip) {
      return {
        ...trip,
        status: normalizeStatus(trip.status),
        days: (trip.days || []).map((day) => ({
          ...day,
          schedule: (day.schedule || []).map((row) => ({
            time: row[0],
            activity: row[1],
            place: row[2],
            confirmation: row[3],
            cost: row[4],
            fixedTime: /^\d{1,2}:\d{2}/.test(row[0] || "")
          }))
        }))
      };
    }

    async function loadTrips() {
      try {
        const response = await fetch("travel-data.json", { cache: "no-store" });
        if (response.ok) {
          const data = await response.json();
          trips = (data.trips || [])
            .filter((trip) => trip.isPublished !== false)
            .map(normalizeNewTrip);
          return;
        }
      } catch (error) {
        console.warn("travel-data.jsonを読み込めませんでした。旧データに切り替えます。", error);
      }
      trips = (window.TRIPS_DATA || []).map(normalizeOldTrip);
    }

    function initFilters() {
      regionFilter.length = 1;
      yearFilter.length = 1;
      [...new Set(trips.map((trip) => trip.region))].forEach((region) => {
        regionFilter.add(new Option(region, region));
      });
      [...new Set(trips.map((trip) => trip.year))].sort().forEach((year) => {
        yearFilter.add(new Option(`${year}年`, year));
      });
    }

    function renderStats() {
      const countries = new Set(trips.flatMap((trip) => trip.countries));
      const days = trips.reduce((sum, trip) => sum + trip.days.length, 0);
      document.getElementById("tripCount").textContent = trips.length;
      document.getElementById("countryCount").textContent = countries.size;
      document.getElementById("dayCount").textContent = days;
    }

    function filteredTrips() {
      const query = search.value.trim().toLowerCase();
      return trips.filter((trip) => {
        const text = [trip.title, trip.region, trip.route, ...trip.countries].join(" ").toLowerCase();
        const statusOk = currentFilter === "all" || trip.status === currentFilter;
        const regionOk = regionFilter.value === "all" || trip.region === regionFilter.value;
        const yearOk = yearFilter.value === "all" || String(trip.year) === yearFilter.value;
        const queryOk = !query || text.includes(query);
        return statusOk && regionOk && yearOk && queryOk;
      });
    }

    function renderTrips() {
      const visibleTrips = filteredTrips();
      grid.innerHTML = "";
      if (!visibleTrips.length) {
        grid.innerHTML = `<div class="empty">条件に合う旅行がありません。検索条件を変えてください。</div>`;
        return;
      }
      visibleTrips.forEach((trip) => {
        const card = document.createElement("button");
        card.className = "trip-card";
        card.type = "button";
        card.innerHTML = `
          <div>
            <div class="trip-meta">
              <span class="pill ${trip.status}">${statusText[trip.status] || trip.status}</span>
              <span class="pill">${trip.year}年</span>
              <span class="pill">${trip.length}</span>
            </div>
            <h3>${trip.title}</h3>
            <p class="route-line">${trip.route}</p>
          </div>
          <div class="card-footer">
            <span>${trip.region}</span>
            <span>${trip.days.length}日分</span>
          </div>
        `;
        card.addEventListener("click", () => openTrip(trip.id));
        grid.appendChild(card);
      });
    }

    function openTrip(id) {
      activeTrip = trips.find((trip) => trip.id === id) || trips[0];
      if (!activeTrip) return;
      activeDay = 0;
      home.classList.add("hidden");
      home.classList.remove("visible");
      detail.classList.add("visible");
      renderDetail();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderDetail() {
      document.getElementById("detailMeta").innerHTML = `
        <span class="pill ${activeTrip.status}">${statusText[activeTrip.status] || activeTrip.status}</span>
        <span class="pill">${activeTrip.year}年</span>
        <span class="pill">${activeTrip.season}</span>
        <span class="pill">${activeTrip.length}</span>
      `;
      document.getElementById("detailTitle").textContent = activeTrip.title;
      document.getElementById("detailConcept").textContent = activeTrip.concept;
      document.getElementById("summaryPanel").innerHTML = `
        <div class="summary-row"><span>地域</span><strong>${activeTrip.region}</strong></div>
        <div class="summary-row"><span>国・地域</span><strong>${activeTrip.countries.join(" / ")}</strong></div>
        <div class="summary-row"><span>ルート</span><strong>${activeTrip.route}</strong></div>
        <div class="summary-row"><span>日数</span><strong>${activeTrip.length}</strong></div>
      `;
      renderDayTabs();
      renderDay();
      renderList("prepList", activeTrip.prep);
      renderList("packingList", activeTrip.packing);
      renderBudget();
      renderNotes();
    }

    function renderDayTabs() {
      const tabs = document.getElementById("dayTabs");
      tabs.innerHTML = "";
      activeTrip.days.forEach((day, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = index === activeDay ? "active" : "";
        button.textContent = compact([day.label, day.date]).join(" ");
        button.addEventListener("click", () => {
          activeDay = index;
          renderDayTabs();
          renderDay();
        });
        tabs.appendChild(button);
      });
    }

    function renderDay() {
      const day = activeTrip.days[activeDay];
      document.getElementById("dayAim").textContent = day.aim;
      renderList("dayChecks", day.checks);
      document.getElementById("scheduleBody").innerHTML = day.schedule.map((row) => `
        <tr>
          <td class="time ${row.fixedTime ? "fixed" : ""}">${row.time || ""}</td>
          <td>${row.activity || ""}</td>
          <td>${compact([row.place, row.distanceKm ? `${row.distanceKm}km` : "", row.durationHours ? `${row.durationHours}h` : ""]).join(" / ")}</td>
          <td>${row.confirmation || ""}</td>
          <td class="cost">${yen(row.cost)}</td>
        </tr>
      `).join("");
    }

    function renderList(id, items) {
      document.getElementById(id).innerHTML = (items || []).map((item) => `
        <li><span class="check" aria-hidden="true"></span><span>${item}</span></li>
      `).join("");
    }

    function renderBudget() {
      document.getElementById("budgetBody").innerHTML = (activeTrip.budget || []).map((row) => `
        <tr><td>${row[0]}</td><td class="cost">${row[1]}</td><td>${row[2]}</td></tr>
      `).join("");
    }

    function renderNotes() {
      document.getElementById("notesList").innerHTML = (activeTrip.notes || []).map((note) => `
        <li>${note}</li>
      `).join("");
    }

    document.querySelectorAll("[data-home-filter]").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll("[data-home-filter]").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        currentFilter = button.dataset.homeFilter;
        renderTrips();
      });
    });

    document.querySelectorAll("[data-view]").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll("[data-view]").forEach((item) => item.classList.remove("active"));
        document.querySelectorAll(".view").forEach((view) => view.classList.remove("active"));
        button.classList.add("active");
        document.getElementById(`${button.dataset.view}View`).classList.add("active");
      });
    });

    document.getElementById("backHome").addEventListener("click", () => {
      detail.classList.remove("visible");
      home.classList.remove("hidden");
      home.classList.add("visible");
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    document.getElementById("showNextTrip").addEventListener("click", () => trips[0] && openTrip(trips[0].id));
    document.getElementById("showPreparing").addEventListener("click", () => {
      const preparingTrip = trips.find((trip) => trip.status === "ready") || trips[0];
      if (preparingTrip) openTrip(preparingTrip.id);
    });
    [search, regionFilter, yearFilter].forEach((input) => input.addEventListener("input", renderTrips));

    loadTrips().then(() => {
      activeTrip = trips[0] || null;
      initFilters();
      renderStats();
      renderTrips();
    });
  </script>
</body>
</html>
